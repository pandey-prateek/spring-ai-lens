name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          # Populates ~/.m2/settings.xml with a <server id="central"> entry whose
          # username/password come from the env vars below — central-publishing-maven-plugin
          # reads that server id via <publishingServerId>central</publishingServerId> in pom.xml.
          server-id: central
          server-username: SONATYPE_USERNAME
          server-password: SONATYPE_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Verify tag matches project version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          POM_VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          if [ "$TAG_VERSION" != "$POM_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match pom.xml version $POM_VERSION"
            exit 1
          fi

      - name: Build, sign, and publish to Maven Central
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B -Prelease clean deploy -DskipTests=false